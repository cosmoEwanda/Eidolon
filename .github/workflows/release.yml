name: Compila e Rilascia l'EXE

on:
  push:
    tags:
      - 'v*' # Si attiva quando fai il push di un tag (es. v1.0.0)

#on:
 # push:
  #  branches:
   #   - main # Si attiva a OGNI push sul ramo main, senza bisogno di tag!
jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # Questa riga attiva la cache nativa per pip basandosi su requirements.txt
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests
        pip install -r requirements.txt

    - name: Compila con PyInstaller usando lo SPEC file
      run: |
        pyinstaller --assume-shared-libs Eidolon.spec

    - name: Crea Release e carica l'EXE
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Eidolon.exe
      env:
        GITHUB_TOKEN: ${{ secrets.EIDOLON_TOKEN }}