name: Compila e Rilascia l'EXE

on:
  push:
    tags:
      - 'v*' # Si attiva quando fai il push di un tag (es. v1.0.0)

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests
        pip install -r requirements.txt

    # Usiamo il file .spec che hai già nel progetto per mantenere le tue impostazioni e i percorsi degli asset
    - name: Compila con PyInstaller usando lo SPEC file
      run: |
        pyinstaller Eidolon.spec

    - name: Crea Release e carica l'EXE
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Eidolon.exe  # Assicurati che l'exe generato nella cartella dist si chiami così
      env:
        GITHUB_TOKEN: ${{ secrets.EIDOLON_TOKEN }}