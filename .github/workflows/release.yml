name: Compila e Rilascia l'EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    # Cambiato da windows-latest a windows-2022 per evitare il bug del server 2025
    runs-on: windows-2022

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Portato a 3.11, infinitamente più stabile con PyInstaller su CI/CD
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests build
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Compila con PyInstaller usando lo SPEC file
      run: |
        # --clean svuota la cache corrotta dei tentativi precedenti
        pyinstaller --clean Eidolon.spec

    - name: Archivia Artifact (Scade in 1 settimana)
      uses: actions/upload-artifact@v4
      with:
        name: Eidolon-dist
        path: dist/
        retention-days: 7

    - name: Crea Release e carica l'EXE
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Eidolon.exe
      env:
        GITHUB_TOKEN: ${{ secrets.EIDOLON_TOKEN }}